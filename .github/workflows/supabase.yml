# =============================================================================
# Supabase CI/CD — Database Migrations + Edge Functions
#
# migrate job: runs on EVERY push to `main` (supabase db push is idempotent —
#   it only applies migrations not yet in the schema_migrations table).
# deploy-functions job: only runs when app/supabase/functions/** changes.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN  — Personal access token from supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID    — Project reference ID (Dashboard → Project Settings → General)
#   SUPABASE_DB_URL        — Direct DB URL: postgresql://postgres:[password]@db.[project-ref].supabase.co:5432/postgres
# =============================================================================

name: Supabase

on:
  push:
    branches:
      - main
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Apply migration files to the production Supabase database.
  # Runs on every push to main. supabase db push is idempotent — it tracks
  # applied migrations and only runs new ones.
  # ---------------------------------------------------------------------------
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Force IPv4 (GitHub Actions runners lack IPv6 routing)
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      - name: Run migrations
        working-directory: app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push \
            --db-url "${{ secrets.SUPABASE_DB_URL }}"

  # ---------------------------------------------------------------------------
  # Job 2: Deploy Supabase Edge Functions to production.
  # Only runs when function source files are changed.
  # ---------------------------------------------------------------------------
  deploy-functions:
    name: Edge Functions
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.commits.*.modified), 'app/supabase/functions/') ||
      contains(toJson(github.event.commits.*.added), 'app/supabase/functions/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        working-directory: app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
