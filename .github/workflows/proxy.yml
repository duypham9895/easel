# =============================================================================
# Proxy CI/CD — Deploy to Vercel
#
# master: Production deploy (vercel deploy --prod)
# develop: Preview deploy (vercel deploy — generates a unique preview URL)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN       — from vercel.com/account/tokens
#   VERCEL_ORG_ID      — from `vercel link` inside proxy/ → .vercel/project.json → orgId
#   VERCEL_PROJECT_ID  — from `vercel link` inside proxy/ → .vercel/project.json → projectId
# =============================================================================

name: Proxy

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'proxy/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: proxy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            DEPLOYMENT_URL=$(vercel deploy --prod --yes \
              --token=${{ secrets.VERCEL_TOKEN }})
            echo "Production deployed to: $DEPLOYMENT_URL"
          else
            DEPLOYMENT_URL=$(vercel deploy --yes \
              --token=${{ secrets.VERCEL_TOKEN }})
            echo "Preview deployed to: $DEPLOYMENT_URL"
          fi
