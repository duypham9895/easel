# =============================================================================
# Notify Cycle — Daily Push Notifications
#
# Invokes the notify-cycle Supabase Edge Function once per day at 8 AM UTC.
# The function calculates each Moon user's cycle phase and sends period
# approach / start / end notifications to both Moon and their linked Sun.
#
# Runs automatically every day. Can also be triggered manually from the
# GitHub Actions tab (workflow_dispatch) for testing.
#
# Required GitHub Secrets:
#   SUPABASE_PROJECT_ID        — Project reference ID (Dashboard → Project Settings)
#   SUPABASE_SERVICE_ROLE_KEY  — Service role key (Dashboard → API → service_role)
# =============================================================================

name: Notify Cycle Daily

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC every day
  workflow_dispatch:        # manual trigger for testing

jobs:
  invoke:
    name: Invoke notify-cycle
    runs-on: ubuntu-latest

    steps:
      - name: Invoke notify-cycle edge function
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/notify-cycle" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{}')

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Edge function returned HTTP $HTTP_STATUS"
            exit 1
          fi
