# Supabase CLI project configuration.
# project_id is required by the CLI. Set it to your Supabase project reference
# (found in: Supabase Dashboard → Project Settings → General → Reference ID).
# This file is safe to commit — it contains no secrets.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:19006"
additional_redirect_urls = ["https://localhost:19006"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
