appId: host.exp.Exponent
tags:
  - calendar
  - full-suite
  - cr002
---

# CR_20260316_002 — Full P0+P1 Device Verification Suite

# Start fresh — navigate to Today then Calendar
- tapOn: "Today, tab, 1 of 3"
- tapOn: "Calendar, tab, 2 of 3"
- waitForAnimationToEnd

# --- TC-001: MyCycleCard removed ---
- assertNotVisible:
    text: "MY CYCLE"
    enabled: true
- assertNotVisible:
    text: "Log a period"
    enabled: true
- takeScreenshot: screenshots/suite-cr002-01-no-mycyclecard

# --- TC-021: Legend visible with all 5 items ---
- scrollUntilVisible:
    element: "Period (logged)"
    direction: DOWN
    timeout: 5000
- assertVisible: "Period (logged)"
- assertVisible: "Period (predicted)"
- assertVisible: "Fertile window"
- assertVisible: "Ovulation day"
- assertVisible: "Today"
- takeScreenshot: screenshots/suite-cr002-02-legend

# --- TC-020: PredictionWindowCard visible ---
- scrollUntilVisible:
    element: "PREDICTION WINDOW"
    direction: DOWN
    timeout: 8000
- assertVisible: "PREDICTION WINDOW"
- takeScreenshot: screenshots/suite-cr002-03-prediction

# --- Scroll back to calendar top ---
- scrollUntilVisible:
    element: "Cycle Calendar"
    direction: UP
    timeout: 5000

# --- TC-003: Tap unlogged day to auto-mark ---
- tapOn:
    text: "8"
    index: 0
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-04-auto-marked

# --- TC-004: Tap same day again to open bottom sheet ---
- tapOn:
    text: "8"
    index: 0
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-05-sheet-open

# --- TC-005: Flow selector in sheet ---
- scrollUntilVisible:
    element: "How's your flow?"
    direction: DOWN
    timeout: 5000
- assertVisible: "A little"
- assertVisible: "Light"
- assertVisible: "Moderate"
- assertVisible: "Heavy"
- tapOn: "Heavy"
- takeScreenshot: screenshots/suite-cr002-06-flow-heavy

# --- TC-006: Symptom chips ---
- scrollUntilVisible:
    element: "How are you feeling?"
    direction: DOWN
    timeout: 5000
- assertVisible: "Cramps"
- assertVisible: "Tired"
- assertVisible: "Headache"
- assertVisible: "Bloating"
- assertVisible: "Moody"
- assertVisible: "Nausea"
- tapOn: "Cramps"
- tapOn: "Headache"
- takeScreenshot: screenshots/suite-cr002-07-symptoms

# --- TC-007: Notes ---
- scrollUntilVisible:
    element: "Add a note"
    direction: DOWN
    timeout: 5000
- tapOn: "How are you feeling today?"
- inputText: "Suite test note"
- takeScreenshot: screenshots/suite-cr002-08-notes

# --- Save ---
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
    timeout: 5000
- tapOn: "Save"
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-09-after-save

# --- TC-016: Backdrop dismiss — open sheet then tap backdrop ---
- tapOn:
    text: "8"
    index: 0
- waitForAnimationToEnd
# Tap near top of screen (backdrop area above the sheet)
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd
# Calendar title should be visible again (sheet dismissed)
- assertVisible: "Cycle Calendar"
- takeScreenshot: screenshots/suite-cr002-10-backdrop-dismiss

# --- TC-008: Delete log ---
- tapOn:
    text: "8"
    index: 0
- waitForAnimationToEnd
- scrollUntilVisible:
    element: "Delete"
    direction: DOWN
    timeout: 5000
- tapOn: "Delete"
- tapOn: "Remove this day"
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-11-after-delete

# --- TC-010: Month navigation ---
- scrollUntilVisible:
    element: "Cycle Calendar"
    direction: UP
    timeout: 5000
- tapOn:
    id: "header.arrow.right"
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-12-next-month
- tapOn:
    id: "header.arrow.left"
- tapOn:
    id: "header.arrow.left"
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-13-prev-month
# Go back to current
- tapOn:
    id: "header.arrow.right"
- waitForAnimationToEnd

# --- TC-009: Future day blocked ---
- tapOn:
    id: "header.arrow.right"
- tapOn:
    id: "header.arrow.right"
- waitForAnimationToEnd
- tapOn:
    text: "15"
    index: 0
# Nothing should happen — assert calendar still showing
- assertVisible: "Cycle Calendar"
- takeScreenshot: screenshots/suite-cr002-14-future-blocked
# Navigate back
- tapOn:
    id: "header.arrow.left"
- tapOn:
    id: "header.arrow.left"
- waitForAnimationToEnd

# --- TC-024: Homepage unchanged ---
- tapOn: "Today, tab, 1 of 3"
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-15-homepage

# --- TC-024 continued: Settings still accessible ---
- tapOn: "Settings, tab, 3 of 3"
- waitForAnimationToEnd
- takeScreenshot: screenshots/suite-cr002-16-settings
